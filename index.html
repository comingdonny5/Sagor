<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IP Finder - Multi-Source Engine</title>

<style>
body {
  background: radial-gradient(circle at top, #1a2a3a 0%, #000000 100%);
  color: #fff;
  font-family: 'Segoe UI', Arial, sans-serif;
  text-align: center;
  padding: 15px;
  margin: 0;
  min-height: 100vh;
}

/* рЯМР Header Section */
.top-header {
  display: flex;
  align-items: center;
  justify-content: flex-start;
  padding: 10px;
  margin-bottom: 10px;
}

.globe-icon {
  font-size: 24px;
  margin-right: 10px;
  border: 1.5px solid #fff;
  border-radius: 50%;
  width: 40px;
  height: 40px;
  display: flex;
  align-items: center;
  justify-content: center;
  box-shadow: 0 0 10px rgba(255,255,255,0.2);
}

.ip-finder-text {
  font-size: 22px;
  font-weight: bold;
  text-transform: uppercase;
  border-bottom: 3px solid #fff;
  letter-spacing: 1px;
}

.creator {
  font-size: 26px;
  font-weight: bold;
  background: linear-gradient(90deg, #00ff99, #00cc66, #00ff99);
  background-size: 200% auto;
  color: transparent;
  -webkit-background-clip: text;
  animation: shine 3s linear infinite;
  margin-top: 15px;
}

@keyframes shine {
  0% { background-position: 0% }
  100% { background-position: 200% }
}

.whatsapp {
  font-size: 15px;
  color: #888;
  margin-bottom: 20px;
}

/* рЯФН Controls */
button.refresh {
  background: #00cc66;
  border: none;
  padding: 12px 30px;
  color: white;
  border-radius: 8px;
  font-size: 16px;
  font-weight: bold;
  cursor: pointer;
  margin-bottom: 25px;
  box-shadow: 0 4px 15px rgba(0, 204, 102, 0.3);
}

.search-container {
  margin-bottom: 30px;
}

.search-title {
  display: block;
  font-size: 14px;
  color: #bbb;
  margin-bottom: 12px;
}

.input-box {
  background: #111;
  border: 1px solid #444;
  padding: 12px;
  border-radius: 6px;
  color: #fff;
  width: 180px;
  outline: none;
  font-size: 15px;
}

.search-btn {
  background: #0099ff;
  border: none;
  padding: 12px 20px;
  color: white;
  border-radius: 6px;
  margin-left: 8px;
  cursor: pointer;
  font-weight: bold;
}

/* рЯУК Results Table */
.chart {
  background: rgba(20, 20, 20, 0.9);
  border-radius: 15px;
  padding: 20px;
  max-width: 420px;
  margin: auto;
  text-align: left;
  border: 1px solid #333;
  box-shadow: 0 10px 30px rgba(0,0,0,0.5);
}

.row {
  display: flex;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px dashed #333;
}

.row b {
  color: #eee;
  font-size: 16px;
}

.copy-btn {
  background: #222;
  border: 1px solid #444;
  padding: 4px 10px;
  font-size: 11px;
  color: #00ff99;
  border-radius: 4px;
  cursor: pointer;
}

.isp-text {
  color: #00ff99;
  font-size: 14px;
  font-weight: bold;
}

.bar-container {
  margin-top: 25px;
  background: #000;
  height: 35px;
  border-radius: 8px;
  overflow: hidden;
  border: 1px solid #222;
}

.fill {
  height: 100%;
  width: 0%;
  text-align: center;
  line-height: 35px;
  font-weight: bold;
  transition: width 1.5s cubic-bezier(0.175, 0.885, 0.32, 1.275);
}
</style>
</head>
<body>

<div class="top-header">
  <div class="globe-icon">рЯМР</div>
  <div class="ip-finder-text">Ip-finder</div>
</div>

<div class="creator" id="creator-name">CREATOR BY SAGOR</div>
<div class="whatsapp">Whatsapp : 01922755197</div>

<button class="refresh" onclick="initLoad()">Refresh Data</button>

<div class="search-container">
  <span id="search-instr" class="search-title">Enter your ip address to find details</span>
  <input type="text" id="ip-input" class="input-box" placeholder="e.g. 8.8.8.8">
  <button class="search-btn" onclick="searchAction()">Search</button>
</div>

<div class="chart">
  <div class="row"><b>Your IP:</b> <span id="res-ip">Connecting...</span></div>
  <div class="row">
    <b>ASN:</b> 
    <span><span id="res-asn">---</span> <button class="copy-btn" onclick="copyVal('res-asn', this)">Copy</button></span>
  </div>
  <div class="row"><b>City:</b> <span id="res-city">---</span></div>
  <div class="row"><b>Region:</b> <span id="res-region">---</span></div>
  <div class="row"><b>Country:</b> <span id="res-country">---</span></div>
  <div class="row"><b>OS:</b> <span id="res-os">---</span></div>
  <div class="row">
    <b>Timezone City:</b> 
    <span><span id="res-tz">---</span> <button class="copy-btn" onclick="copyVal('res-tz', this)">Copy</button></span>
  </div>
  <div class="row"><b>ISP:</b> <span id="res-isp" class="isp-text">---</span></div>

  <div class="bar-container">
    <div class="fill" id="bar">Waiting...</div>
  </div>
</div>

<script>
const boldChars = {'A':'рЭРА','B':'рЭРБ','C':'рЭРВ','D':'рЭРГ','E':'рЭРД','F':'рЭРЕ','G':'рЭРЖ','H':'рЭРЗ','I':'рЭРИ','J':'рЭРЙ','K':'рЭРК','L':'рЭРЛ','M':'рЭРМ','N':'рЭРН','O':'рЭРО','P':'рЭРП','Q':'рЭРР','R':'рЭРС','S':'рЭРТ','T':'рЭРУ','U':'рЭРФ','V':'рЭРХ','W':'рЭРЦ','X':'рЭРЧ','Y':'рЭРШ','Z':'рЭРР','a':'рЭРЪ','b':'рЭРЫ','c':'рЭРЬ','d':'рЭРЭ','e':'рЭРЮ','f':'рЭРЯ','g':'рЭР†','h':'рЭР°','i':'рЭРҐ','j':'рЭР£','k':'рЭР§','l':'рЭР•','m':'рЭР¶','n':'рЭРІ','o':'рЭР®','p':'рЭР©','q':'рЭР™','r':'рЭРЂ','s':'рЭРђ','t':'рЭР≠','u':'рЭРЃ','v':'рЭРѓ','w':'рЭР∞','x':'рЭР±','y':'рЭР≤','z':'рЭР≥','0':'рЭЯО','1':'рЭЯП','2':'рЭЯР','3':'рЭЯС','4':'рЭЯТ','5':'рЭЯУ','6':'рЭЯФ','7':'рЭЯХ','8':'рЭЯЦ','9':'рЭЯЧ'};
function textToBold(t) { return t.split('').map(c => boldChars[c] || c).join(''); }

async function initLoad(manualIP = '') {
  const bar = document.getElementById('bar');
  bar.style.width = "0%";
  bar.innerText = "Analyzing...";
  bar.style.background = "#222";
  bar.style.color = "#fff";

  let success = await callAPI(`https://ipwho.is/${manualIP}`, true);
  if(!success) {
    success = await callAPI(`https://ipapi.co/${manualIP}/json/`, false);
  }

  if(!success) {
    bar.style.width = "100%";
    bar.innerText = "Connection Failed!";
    bar.style.background = "#f44336";
  }
}

async function callAPI(url, isWhoIs) {
  try {
    const r = await fetch(url);
    const d = await r.json();
    
    if(isWhoIs && !d.success) return false;
    if(!isWhoIs && d.error) return false;

    document.getElementById('res-ip').innerText = d.ip || d.query;
    document.getElementById('res-asn').innerText = isWhoIs ? (d.connection.asn || "N/A") : (d.asn || "N/A");
    document.getElementById('res-city').innerText = d.city || "N/A";
    document.getElementById('res-region').innerText = d.region || d.region_name || "N/A";
    document.getElementById('res-country').innerText = d.country || d.country_name || "N/A";
    document.getElementById('res-isp').innerText = isWhoIs ? d.connection.isp : d.org;
    
    // Timezone City
    if(isWhoIs && d.timezone) {
        document.getElementById('res-tz').innerText = d.timezone.id.split('/').pop().replace('_', ' ');
    } else {
        document.getElementById('res-tz').innerText = d.timezone ? d.timezone.split('/').pop().replace('_', ' ') : "N/A";
    }

    const ua = navigator.userAgent;
    document.getElementById('res-os').innerText = ua.includes("Android") ? "Android" : (ua.includes("Windows") ? "Windows" : "Device");

    // Dynamic Whoer-style Disguise Logic
    const bar = document.getElementById('bar');
    let isVpn = isWhoIs ? (d.security.is_vpn || d.security.is_proxy) : false;
    
    let score;
    if(isVpn) {
        // VPN а¶•а¶Ња¶Ха¶≤аІЗ а¶≠аІЗа¶∞а¶њаІЯаІЗа¶ђа¶≤ а¶ЄаІНа¶ХаІЛа¶∞ (аІ™аІ¶-аІ≠аІ¶)
        score = Math.floor(Math.random() * (70 - 40 + 1)) + 40;
    } else {
        // а¶∞а¶њаІЯаІЗа¶≤ а¶Ха¶Ња¶®аІЗа¶Ха¶ґа¶® а¶єа¶≤аІЗ Whoer а¶Па¶∞ а¶Ѓа¶§аІЛ (аІѓаІ¶-аІІаІ¶аІ¶) а¶∞вАНаІНа¶ѓа¶Ња¶®аІНа¶°а¶Ѓ а¶ЄаІНа¶ХаІЛа¶∞
        let possibleScores = [90, 92, 95, 97, 100];
        score = possibleScores[Math.floor(Math.random() * possibleScores.length)];
    }

    // Animation Delay for Real Feel
    setTimeout(() => {
        bar.style.width = score + "%";
        bar.innerText = textToBold("Your Disguise: ") + score + "%";
        bar.style.background = score >= 90 ? "#00ff99" : (score >= 70 ? "#ffcc00" : "#ff4444");
        bar.style.color = "#000";
    }, 500);
    
    return true;
  } catch (e) {
    return false;
  }
}

function searchAction() {
  const val = document.getElementById('ip-input').value.trim();
  if(val) initLoad(val);
  else alert("Enter a valid IP address!");
}

function copyVal(id, btn) {
  navigator.clipboard.writeText(document.getElementById(id).innerText);
  const old = btn.innerText;
  btn.innerText = "Copied!";
  setTimeout(() => btn.innerText = old, 1200);
}

window.onload = () => {
  document.getElementById('creator-name').innerText = textToBold("CREATOR BY SAGOR");
  document.getElementById('search-instr').innerText = textToBold("Enter your ip address to find details");
  initLoad();
};
</script>

</body>
</html>
